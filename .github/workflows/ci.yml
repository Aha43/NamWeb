name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *' # nightly full e2e pass on main
  workflow_dispatch: # run e2e on demand

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    # Dummy Supabase env so module init never throws during build/test.
    env:
      VITE_SUPABASE_URL: http://127.0.0.1:54321
      VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  # Network-mocked Playwright journeys — no Supabase backend (the HTTP calls are intercepted).
  # Deliberately NOT a PR gate (it can be slow on busy runners and would bottleneck the
  # short-line one-PR-per-lap flow). Instead it runs post-merge on `main`, nightly, and on demand
  # — and we run it locally before pushing. So every merge is still e2e-gated, just not blocking
  # the PR. The real-backend smoke (smoke.spec.ts) needs a live stack and stays out of CI.
  e2e-mocked:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: http://127.0.0.1:54321
      VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium webkit
      - run: npx playwright test --project=mocked-desktop --project=mocked-phone
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
