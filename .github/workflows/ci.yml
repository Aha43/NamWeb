name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *' # nightly full e2e pass on main
  workflow_dispatch: # run e2e on demand

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    # Dummy Supabase env so module init never throws during build/test.
    env:
      VITE_SUPABASE_URL: http://127.0.0.1:54321
      VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run i18n:check # incl. shared domain vocab sync — drift slipped to main once (#696)
      - run: npm run test
      - run: npm run build

  # Clean-database migration gate (#832/P2): the mocked pipeline never touches a real DB, so a
  # migration that fails on a fresh reset (bad order, non-idempotent alter, function drop/recreate
  # mismatch) could reach prod undetected. This applies EVERY migration from scratch on each PR.
  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Apply all migrations to a clean database
        # `supabase start` boots a fresh local Postgres and applies every file in
        # supabase/migrations/ in order — it FAILS on a bad order, a non-idempotent alter, or a
        # function drop/recreate mismatch. Parallel to `check` (not a branch-protection gate),
        # so Supabase-image flakiness never blocks a merge while still surfacing real breakage.
        run: supabase start

  # Network-mocked Playwright journeys — no Supabase backend (the HTTP calls are intercepted).
  # Deliberately NOT a PR gate, nor per-merge: it runs **nightly** and **on demand**
  # (workflow_dispatch). The per-change gate is running it locally before pushing; the nightly is
  # the catch-all. (Not per-merge because, merging one PR per lap, that was an e2e run per merge.)
  # The real-backend smoke (smoke.spec.ts) needs a live stack and stays out of CI.
  e2e-mocked:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: http://127.0.0.1:54321
      VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # Cache the browser binaries (the slow part) — keyed on the lockfile so a Playwright bump busts it.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers (+ OS deps)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit
      - name: Install Playwright OS deps (cached browsers)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit
      - run: npx playwright test --project=mocked-desktop --project=mocked-phone
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
